<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوبر ماركت أونلاين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 pb-20">

    <!-- Header -->
    <nav class="bg-green-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">متجري الرقمي 🛒</h1>
            <div class="bg-white text-green-600 px-3 py-1 rounded-full font-bold">
                السلة: <span id="cartCount">0</span>
            </div>
        </div>
    </nav>

    <!-- Products Grid -->
    <div class="container mx-auto p-4">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <!-- المنتجات ستظهر هنا -->
        </div>
    </div>

    <!-- Floating Order Button -->
    <div class="fixed bottom-5 left-5 right-5 md:left-auto md:w-64 z-50">
        <button onclick="sendToWhatsApp()" class="w-full bg-green-500 text-white px-6 py-4 rounded-2xl shadow-2xl font-bold text-lg hover:bg-green-700 transition-all flex items-center justify-center gap-2">
            <span>✅ إتمام الطلب عبر واتساب</span>
        </button>
    </div>

    <script>
        // قائمة المنتجات (عدلها كما تشاء)
        const products = [
            {id: 1, name: "أرز مصري ممتاز", price: 35, image: "https://placehold.co/200x200?text=Rice"},
            {id: 2, name: "زيت عباد شمس", price: 70, image: "https://placehold.co/200x200?text=Oil"},
            {id: 3, name: "مكرونة 400جم", price: 15, image: "https://placehold.co/200x200?text=Pasta"},
            {id: 4, name: "علبة جبنة 500جم", price: 45, image: "https://placehold.co/200x200?text=Cheese"},
            {id: 5, name: "سكر 1 كجم", price: 30, image: "https://placehold.co/200x200?text=Sugar"}
        ];

        let cart = [];

        function displayProducts() {
            const grid = document.getElementById('productGrid');
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                        <img src="${p.image}" class="w-full h-32 object-contain mb-3">
                        <h3 class="font-bold text-sm h-10">${p.name}</h3>
                        <p class="text-green-600 font-bold mb-2">${p.price} ج.م</p>
                        <button onclick="addToCart(${p.id})" class="w-full bg-gray-100 text-gray-800 py-2 rounded-lg hover:bg-green-100 transition">إضافة +</button>
                    </div>
                `;
            });
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            document.getElementById('cartCount').innerText = cart.length;
        }

        function sendToWhatsApp() {
            if (cart.length === 0) {
                alert("برجاء إضافة منتجات للسلة أولاً");
                return;
            }

            const phone = "201145754550"; // رقمك تم ضبطه هنا
            let text = "طلب جديد من المتجر:\n------------------\n";
            let total = 0;

            cart.forEach((item, index) => {
                text += `${index + 1}. ${item.name} - ${item.price} ج.م\n`;
                total += item.price;
            });

            text += `\n------------------\n💰 الإجمالي: ${total} ج.م`;
            
            const url = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }

        displayProducts();
    </script>
</body>
</html>
