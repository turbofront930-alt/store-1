<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوبر ماركت خير بلدنا | الجودة والوفر</title>
    
    <!-- أيقونة الموقع (تظهر في التبويب) -->
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3081/3081840.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .logo-gradient { background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); }
    </style>
</head>
<body class="pb-32">

    <!-- Header المطور مع اللوجو الجديد -->
    <nav class="bg-green-700 text-white shadow-2xl sticky top-0 z-50">
        <div class="container mx-auto p-4">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <!-- لوجو المتجر -->
                    <div class="bg-white p-2 rounded-2xl shadow-inner">
                        <img src="https://cdn-icons-png.flaticon.com/512/3737/3737372.png" alt="لوجو خير بلدنا" class="w-10 h-10">
                    </div>
                    <div>
                        <h1 class="text-2xl font-black tracking-tight leading-none">خير بلدنا</h1>
                        <p class="text-[10px] opacity-80 font-bold uppercase tracking-widest">سوبر ماركت</p>
                    </div>
                </div>
                <!-- سلة المشتريات -->
                <div class="bg-yellow-400 text-green-900 px-5 py-2 rounded-2xl font-black flex items-center gap-2 shadow-lg scale-110">
                    <span class="text-xl">🛒</span>
                    <span id="cartCount">0</span>
                </div>
            </div>
            <!-- بار البحث -->
            <div class="relative">
                <input type="text" id="searchBar" onkeyup="searchProducts()" placeholder="ابحث عن منتجاتك في خير بلدنا..." 
                class="w-full p-4 rounded-2xl text-black shadow-inner focus:ring-4 focus:ring-yellow-400 outline-none border-none text-lg">
            </div>
        </div>
    </nav>

    <!-- تصنيفات الأقسام -->
    <div class="bg-white border-b sticky top-[145px] z-40 overflow-x-auto no-scrollbar shadow-sm">
        <div class="container mx-auto flex p-3 gap-3 whitespace-nowrap">
            <button onclick="filterBy('all')" class="bg-green-600 text-white px-8 py-2 rounded-xl font-bold shadow-md">الكل</button>
            <button onclick="filterBy('food')" class="bg-gray-100 px-6 py-2 rounded-xl font-bold">المواد الغذائية</button>
            <button onclick="filterBy('dairy')" class="bg-gray-100 px-6 py-2 rounded-xl font-bold">الألبان</button>
            <button onclick="filterBy('clean')" class="bg-gray-100 px-6 py-2 rounded-xl font-bold">المنظفات</button>
        </div>
    </div>

    <!-- شبكة المنتجات -->
    <div class="container mx-auto p-4">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <!-- سيتم توليد 5000 منتج هنا تلقائياً -->
        </div>
        
        <div class="text-center mt-12 mb-8">
            <button id="loadMoreBtn" onclick="loadMore()" class="bg-white border-2 border-green-600 text-green-600 px-12 py-4 rounded-2xl font-black hover:bg-green-600 hover:text-white transition-all shadow-xl">
                تصفح المزيد من خير بلدنا...
            </button>
        </div>
    </div>

    <!-- زر إتمام الطلب العائم -->
    <div class="fixed bottom-6 left-4 right-4 md:left-auto md:right-6 md:w-96 z-50">
        <button onclick="openOrderModal()" class="w-full bg-green-600 text-white p-6 rounded-[2.5rem] shadow-[0_20px_50px_rgba(22,163,74,0.4)] font-black text-xl flex justify-between items-center border-4 border-white transition-transform active:scale-95">
            <div class="flex flex-col items-start">
                <span>تأكيد الطلب الآن</span>
                <span class="text-[10px] font-normal opacity-90">توصيل سريع لباب البيت 🚚</span>
            </div>
            <span id="totalDisplay" class="bg-white text-green-700 px-5 py-2 rounded-2xl shadow-inner">0 ج.م</span>
        </button>
    </div>

    <!-- نافذة البيانات (Modal) -->
    <div id="orderModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-[3rem] p-8 w-full max-w-md shadow-2xl border-t-8 border-green-600">
            <h2 class="text-3xl font-black mb-2 text-center text-gray-800">بياناتك يا بطل</h2>
            <p class="text-center text-gray-500 mb-8 text-sm">خير بلدنا بيوصلك في أسرع وقت!</p>
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="اسمك الكريم" class="w-full bg-gray-50 border-2 border-gray-100 p-5 rounded-2xl outline-none focus:border-green-500">
                <input type="text" id="custAddress" placeholder="عنوانك بالتفصيل" class="w-full bg-gray-50 border-2 border-gray-100 p-5 rounded-2xl outline-none focus:border-green-500">
                <button onclick="finalSubmit()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black text-2xl shadow-xl hover:bg-green-700 transition-all">إرسال عبر واتساب</button>
                <button onclick="closeModal()" class="w-full text-gray-400 font-bold py-2">رجوع</button>
            </div>
        </div>
    </div>

    <script>
        // --- مصفوفة السلع الأساسية بأسعار 2026 ---
        const baseItems = [
            {n: "أرز بلدي خير بلدنا", p: 55, c: "food", img: "https://cdn-icons-png.flaticon.com/512/3737/3737372.png"},
            {n: "زيت عباد شمس 800مل", p: 115, c: "food", img: "https://cdn-icons-png.flaticon.com/512/3737/3737372.png"},
            {n: "سكر نقي 1كجم", p: 52, c: "food", img: "https://cdn-icons-png.flaticon.com/512/3737/3737372.png"},
            {n: "مكرونة أنواع 400جم", p: 24, c: "food", img: "https://cdn-icons-png.flaticon.com/512/3737/3737372.png"},
            {n: "حليب فريش 1لتر", p: 68, c: "dairy", img: "https://cdn-icons-png.flaticon.com/512/3737/3737372.png"},
            {n: "جبنة بيضا عبوة كبيرة", p: 75, c: "dairy", img: "https://cdn-icons-png.flaticon.com/512/3737/3737372.png"},
            {n: "منظف صحون مركز", p: 45, c: "clean", img: "https://cdn-icons-png.flaticon.com/512/3737/3737372.png"},
            {n: "مسحوق غسيل 2.5ك", p: 310, c: "clean", img: "https://cdn-icons-png.flaticon.com/512/3737/3737372.png"}
        ];

        let allProducts = [];
        let displayedCount = 48;
        let cart = [];

        // توليد 5000 منتج بأسماء مختلفة
        for (let i = 1; i <= 5000; i++) {
            let base = baseItems[i % baseItems.length];
            allProducts.push({
                id: i,
                name: `${base.n} - رقم ${i}`,
                price: base.p + (i % 5),
                cat: base.c,
                img: base.img
            });
        }

        function renderProducts(limit = displayedCount, data = allProducts) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            data.slice(0, limit).forEach(p => {
                grid.innerHTML += `
                    <div class="product-card bg-white p-4 rounded-[2.5rem] shadow-sm border border-gray-50 flex flex-col justify-between">
                        <div>
                            <div class="bg-gray-50 rounded-3xl p-4 mb-3">
                                <img src="${p.img}" class="w-full h-20 object-contain opacity-40">
                            </div>
                            <h3 class="font-bold text-xs text-gray-800 leading-tight mb-2 h-8 overflow-hidden">${p.name}</h3>
                            <p class="text-green-600 font-black text-lg mb-4">${p.price} <small class="text-[10px]">ج.م</small></p>
                        </div>
                        <button onclick="addToCart(${p.id})" class="w-full bg-green-50 text-green-700 py-3 rounded-2xl font-black text-xs hover:bg-green-600 hover:text-white transition-all">إضافة للسلة</button>
                    </div>
                `;
            });
        }

        function addToCart(id) {
            const p = allProducts.find(x => x.id === id);
            cart.push(p);
            document.getElementById('cartCount').innerText = cart.length;
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('totalDisplay').innerText = total + " ج.م";
            
            // انيميشن بسيط
            const btn = event.target;
            btn.innerText = "🛒 تمت الإضافة";
            btn.classList.add('bg-green-600', 'text-white');
            setTimeout(() => {
                btn.innerText = "إضافة للسلة";
                btn.classList.remove('bg-green-600', 'text-white');
            }, 800);
        }

        function loadMore() {
            displayedCount += 48;
            renderProducts(displayedCount);
            if(displayedCount >= 5000) document.getElementById('loadMoreBtn').classList.add('hidden');
        }

        function searchProducts() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            renderProducts(48, filtered);
        }

        function filterBy(cat) {
            const filtered = cat === 'all' ? allProducts : allProducts.filter(p => p.cat === cat);
            renderProducts(48, filtered);
        }

        function openOrderModal() {
            if(cart.length === 0) return alert("السلة فاضية يا فندم!");
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('orderModal').classList.add('hidden'); }

        function finalSubmit() {
            const name = document.getElementById('custName').value;
            const addr = document.getElementById('custAddress').value;
            if(!name || !addr) return alert("أدخل اسمك وعنوانك");

            let message = `🏪 *طلب جديد من سوبر ماركت خير بلدنا (2026)*\n\n👤 *العميل:* ${name}\n📍 *العنوان:* ${addr}\n\n*قائمة المشتريات:*\n`;
            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.name} (${item.price} ج)\n`;
            });
            message += `\n💰 *الإجمالي: ${cart.reduce((s,i)=>s+i.price,0)} ج.م*`;

            window.open(`https://wa.me/201145754550?text=${encodeURIComponent(message)}`, '_blank');
        }

        renderProducts();
    </script>
</body>
</html>
