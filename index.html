<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خير بلدنا | 10,000 منتج</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3737/3737372.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .product-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .product-card:hover { transform: translateY(-5px); border-color: #16a34a; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .engineer-bar { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(8px); border-top: 2px solid #16a34a; }
        .category-btn.active { background-color: #16a34a; color: white; border-color: #16a34a; }
    </style>
</head>
<body class="pb-60">

    <!-- Header -->
    <nav class="bg-green-700 text-white shadow-2xl sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center mb-3">
            <div class="flex items-center gap-3">
                <img src="https://cdn-icons-png.flaticon.com/512/3737/3737372.png" class="w-10 h-10 bg-white rounded-xl p-1">
                <h1 class="text-xl font-black italic underline decoration-yellow-400">خير بلدنا</h1>
            </div>
            <div class="bg-yellow-400 text-green-900 px-5 py-2 rounded-2xl font-black shadow-lg">
                🛒 <span id="cartCount" class="text-xl">0</span>
            </div>
        </div>
        <input type="text" id="searchBar" onkeyup="searchProducts()" placeholder="ابحث في أكبر مخزن أونلاين (10,000 صنف)..." 
        class="w-full p-4 rounded-2xl text-black shadow-inner outline-none focus:ring-4 focus:ring-yellow-400 border-none">
    </nav>

    <!-- أقسام المتجر (10 أقسام) -->
    <div class="sticky top-[145px] z-40 bg-white shadow-md">
        <div class="container mx-auto flex p-3 gap-2 overflow-x-auto no-scrollbar whitespace-nowrap">
            <button onclick="filterBy('all')" class="category-btn active border-2 px-6 py-2 rounded-xl font-bold transition-all">الكل</button>
            <button onclick="filterBy('البقالة')" class="category-btn border-2 px-6 py-2 rounded-xl font-bold transition-all">البقالة</button>
            <button onclick="filterBy('المجمدات')" class="category-btn border-2 px-6 py-2 rounded-xl font-bold transition-all">المجمدات</button>
            <button onclick="filterBy('الألبان')" class="category-btn border-2 px-6 py-2 rounded-xl font-bold transition-all">الألبان</button>
            <button onclick="filterBy('المنظفات')" class="category-btn border-2 px-6 py-2 rounded-xl font-bold transition-all">الالمنظفات</button>
            <button onclick="filterBy('المعلبات')" class="category-btn border-2 px-6 py-2 rounded-xl font-bold transition-all">المعلبات</button>
            <button onclick="filterBy('المشروبات')" class="category-btn border-2 px-6 py-2 rounded-xl font-bold transition-all">المشروبات</button>
            <button onclick="filterBy('العطارة')" class="category-btn border-2 px-6 py-2 rounded-xl font-bold transition-all">العطارة</button>
            <button onclick="filterBy('التسالي')" class="category-btn border-2 px-6 py-2 rounded-xl font-bold transition-all">التسالي</button>
            <button onclick="filterBy('الخضروات')" class="category-btn border-2 px-6 py-2 rounded-xl font-bold transition-all">خضار وفاكهة</button>
            <button onclick="filterBy('الورقيات')" class="category-btn border-2 px-6 py-2 rounded-xl font-bold transition-all">ورقيات ومناديل</button>
        </div>
    </div>

    <!-- شبكة المنتجات -->
    <div class="container mx-auto p-4">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <!-- سيتم توليد 10,000 منتج هنا -->
        </div>
        <div class="text-center mt-12">
            <button id="loadMoreBtn" onclick="loadMore()" class="bg-white border-4 border-green-600 text-green-700 px-12 py-4 rounded-3xl font-black hover:bg-green-600 hover:text-white transition-all shadow-xl">تحميل المزيد من المنتجات...</button>
        </div>
    </div>

    <!-- زر إتمام الطلب -->
    <div class="fixed bottom-16 left-4 right-4 z-[70] md:max-w-md md:mx-auto">
        <button onclick="openOrderModal()" class="w-full bg-green-600 text-white p-5 rounded-[2rem] shadow-2xl flex justify-between items-center border-4 border-white transition-transform active:scale-95">
            <span class="text-xl font-black tracking-tight">تأكيد شروة الخير 🛍️</span>
            <span id="totalDisplay" class="bg-white text-green-700 px-6 py-1 rounded-2xl font-black">0 ج.م</span>
        </button>
    </div>

    <!-- شريط المهندس إبراهيم سعد (الثابت) -->
    <div class="fixed bottom-0 left-0 right-0 z-[80] engineer-bar text-white py-3 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-green-600 w-8 h-8 rounded-full flex items-center justify-center font-black text-xs shadow-lg">IS</div>
                <div class="flex flex-col">
                    <span class="text-[10px] text-gray-400 leading-none">Developer By:</span>
                    <span class="text-sm font-black text-white">مهندس إبراهيم سعد</span>
                </div>
            </div>
            <a href="https://wa.me/201101475409" class="bg-green-500/20 border border-green-500/50 px-4 py-1 rounded-xl flex items-center gap-2 group hover:bg-green-500 transition-all">
                <span class="text-xs font-bold">للتواصل:</span>
                <span class="text-sm font-black text-yellow-400 group-hover:text-white transition-colors tracking-tighter">01101475409</span>
            </a>
        </div>
    </div>

    <script>
        // مصفوفة الأقسام والمنتجات الأساسية
        const categories = ["البقالة", "المجمدات", "الألبان", "المنظفات", "المعلبات", "المشروبات", "العطارة", "التسالي", "الخضروات", "الورقيات"];
        const samples = [
            {n: "أرز بلدي", p: 55}, {n: "زيت خليط", p: 110}, {n: "سكر نقي", p: 52},
            {n: "مكرونة", p: 22}, {n: "حليب", p: 65}, {n: "جبنة بلس", p: 70},
            {n: "مسحوق غسيل", p: 290}, {n: "تونا", p: 45}, {n: "شاي", p: 130}, {n: "عصير", p: 15}
        ];

        let allProducts = [];
        let displayedCount = 40;
        let currentFilter = 'all';
        let cart = [];

        // --- مولد الـ 10,000 منتج الذكي ---
        function generateData() {
            for (let i = 1; i <= 10000; i++) {
                let catIndex = Math.floor((i - 1) / 1000); // كل 1000 صنف في قسم
                let sample = samples[i % samples.length];
                allProducts.push({
                    id: i,
                    name: `${sample.n} ${categories[catIndex]} - صنف #${i}`,
                    price: sample.p + (i % 50),
                    cat: categories[catIndex],
                    img: "https://cdn-icons-png.flaticon.com/512/3737/3737372.png"
                });
            }
        }

        function renderProducts(reset = false) {
            const grid = document.getElementById('productGrid');
            if(reset) grid.innerHTML = '';
            
            let filtered = currentFilter === 'all' ? allProducts : allProducts.filter(p => p.cat === currentFilter);
            let toShow = filtered.slice(grid.children.length, grid.children.length + 40);

            toShow.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card bg-white p-4 rounded-[2rem] shadow-sm flex flex-col justify-between">
                        <div>
                            <div class="bg-gray-50 rounded-2xl p-4 mb-3 flex justify-center">
                                <img src="${p.img}" class="h-16 opacity-30">
                            </div>
                            <h3 class="font-bold text-[11px] text-gray-700 leading-tight mb-2 h-8 overflow-hidden">${p.name}</h3>
                            <p class="text-green-600 font-black text-xl mb-3">${p.price} <small class="text-[10px]">ج</small></p>
                        </div>
                        <button onclick="addToCart(${p.id})" class="w-full bg-gray-900 text-white py-3 rounded-xl font-bold text-xs hover:bg-green-600 transition-all active:scale-90">أضف +</button>
                    </div>
                `;
            });
        }

        function filterBy(cat) {
            currentFilter = cat;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText === cat || (cat === 'all' && btn.innerText === 'الكل')) btn.classList.add('active');
            });
            renderProducts(true);
        }

        function loadMore() { renderProducts(); }

        function addToCart(id) {
            const p = allProducts.find(x => x.id === id);
            cart.push(p);
            document.getElementById('cartCount').innerText = cart.length;
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('totalDisplay').innerText = total + " ج.م";
        }

        function searchProducts() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            filtered.slice(0, 40).forEach(p => { /* نفس كود الـ innerHTML */ });
        }

        // تشغيل التوليد عند الفتح
        generateData();
        renderProducts();
    </script>
</body>
</html>
