<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خير بلدنا | 10,000 صنف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .product-card { transition: all 0.3s ease; border-radius: 1.5rem; background: white; border: 1px solid #eee; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .whatsapp-btn { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .eng-footer { background: #111827; border-top: 3px solid #16a34a; }
    </style>
</head>
<body class="pb-44">

    <!-- Header -->
    <nav class="bg-green-700 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://cdn-icons-png.flaticon.com/512/3737/3737372.png" class="w-10 h-10 bg-white rounded-xl p-1 shadow-md">
                <h1 class="text-xl font-black tracking-tight">خير بلدنا</h1>
            </div>
            <div class="bg-yellow-400 text-green-900 px-5 py-1.5 rounded-2xl font-black shadow-lg">
                🛒 <span id="cartCount" class="text-xl">0</span>
            </div>
        </div>
    </nav>

    <!-- الأقسام بالعامية -->
    <div class="bg-white shadow-sm overflow-x-auto no-scrollbar whitespace-nowrap p-4 sticky top-[72px] z-40 border-b">
        <div class="flex gap-3" id="catBar">
            <!-- سيتم توليد الأقسام برمجياً -->
        </div>
    </div>

    <!-- شبكة المنتجات -->
    <div class="container mx-auto p-4">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-5">
            <!-- 10,000 منتج مصري -->
        </div>
        <div class="text-center mt-12 mb-10">
            <button onclick="loadMore()" class="bg-green-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl hover:bg-green-700 active:scale-95 transition-all">
                هات منتجات تانية...
            </button>
        </div>
    </div>

    <!-- زر الواتساب العائم -->
    <a href="https://wa.me/201145754550" target="_blank" class="fixed bottom-36 right-6 z-[60] whatsapp-btn bg-green-500 text-white p-4 rounded-full shadow-2xl flex items-center justify-center border-4 border-white">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.601 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
        </svg>
    </a>

    <!-- إتمام الطلب -->
    <div class="fixed bottom-14 left-4 right-4 z-50 md:max-w-md md:mx-auto">
        <button onclick="sendToWhatsApp()" class="w-full bg-green-600 text-white p-5 rounded-2xl shadow-2xl flex justify-between items-center border-4 border-white active:scale-95 transition-all">
            <span class="font-black text-lg">تأكيد الطلب 🛍️</span>
            <span id="totalDisplay" class="bg-white text-green-700 px-5 py-1 rounded-xl font-black">0 ج.م</span>
        </button>
    </div>

    <!-- شريط المهندس إبراهيم سعد (ثابت) -->
    <footer class="fixed bottom-0 left-0 right-0 z-[70] eng-footer text-white py-3 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-green-600 w-7 h-7 rounded-full flex items-center justify-center font-black text-[10px]">IS</div>
                <div class="text-[11px]">تصميم المهندس: <span class="font-black text-green-400">إبراهيم سعد</span></div>
            </div>
            <a href="https://wa.me/201101475409" class="text-yellow-400 font-black text-xs">01101475409</a>
        </div>
    </footer>

    <script>
        // قاموس أسماء المنتجات بالعامية وصور معبرة
        const egyptianProducts = [
            {n: "أرز مصري عريض", img: "https://images.unsplash.com/photo-1586201375761-83865001e31c?auto=format&fit=crop&q=80&w=200"},
            {n: "مكرونة قلم فينو", img: "https://images.unsplash.com/photo-1621961458348-f013d219b50c?auto=format&fit=crop&q=80&w=200"},
            {n: "زيت صني قلي", img: "https://images.unsplash.com/photo-1474979266404-7eaacbadb8c5?auto=format&fit=crop&q=80&w=200"},
            {n: "سمنة بلدي جنة", img: "https://images.unsplash.com/photo-1589923188900-85dae523342b?auto=format&fit=crop&q=80&w=200"},
            {n: "لبن جهينة بخيره", img: "https://images.unsplash.com/photo-1550583724-125581f77833?auto=format&fit=crop&q=80&w=200"},
            {n: "تونا مفتتة سهلة", img: "https://images.unsplash.com/photo-1599059813005-11265ba4b4ce?auto=format&fit=crop&q=80&w=200"},
            {n: "شاي العروسة خرز", img: "https://images.unsplash.com/photo-1544787210-2211d2473dcc?auto=format&fit=crop&q=80&w=200"},
            {n: "بيبسي لتر ونصف", img: "https://images.unsplash.com/photo-1622483767028-3f66f34a50f4?auto=format&fit=crop&q=80&w=200"},
            {n: "منظف أوكسي ريحة", img: "https://images.unsplash.com/photo-1584622781564-1d9876a13d00?auto=format&fit=crop&q=80&w=200"},
            {n: "جبنة عبور فيتا", img: "https://images.unsplash.com/photo-1559561853-08451507c73a?auto=format&fit=crop&q=80&w=200"}
        ];

        const cats = ["البقالة", "المنظفات", "ساقع وعصائر", "جبن وألبان", "مجمدات"];
        let allProducts = [];
        let cart = [];

        // توليد الـ 10,000 منتج ببيانات واقعية
        for (let i = 1; i <= 10000; i++) {
            let sample = egyptianProducts[i % egyptianProducts.length];
            allProducts.push({
                id: i,
                name: `${sample.n} - ${i}`,
                price: 25 + (i % 120),
                cat: cats[i % cats.length],
                img: sample.img
            });
        }

        function render() {
            const grid = document.getElementById('productGrid');
            const toAdd = allProducts.slice(grid.children.length, grid.children.length + 24);
            toAdd.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card p-4 flex flex-col justify-between">
                        <div class="relative mb-3">
                            <img src="${p.img}" class="w-full h-32 object-cover rounded-2xl shadow-inner">
                            <span class="absolute top-2 right-2 bg-green-600 text-white text-[8px] font-black px-2 py-1 rounded-lg shadow-md tracking-tighter">صنف مختار</span>
                        </div>
                        <h3 class="text-[11px] font-bold text-gray-700 h-8 overflow-hidden mb-2">${p.name}</h3>
                        <p class="text-green-600 font-black text-xl mb-3">${p.price} <small class="text-[10px]">ج</small></p>
                        <button onclick="addToCart(${p.id})" class="w-full bg-gray-900 text-white py-2.5 rounded-xl text-[10px] font-black active:scale-95 transition-all">أضف +</button>
                    </div>
                `;
            });
        }

        function addToCart(id) {
            const p = allProducts.find(x => x.id === id);
            cart.push(p);
            document.getElementById('cartCount').innerText = cart.length;
            document.getElementById('totalDisplay').innerText = cart.reduce((s,i) => s + i.price, 0) + " ج.م";
        }

        function sendToWhatsApp() {
            if(cart.length === 0) return alert("السلة فاضية يا فندم!");
            let msg = `🛒 *طلب جديد من متجر خير بلدنا*\n\n`;
            cart.forEach((item, i) => msg += `${i+1}. ${item.name} (${item.price} ج)\n`);
            msg += `\n💰 *الإجمالي: ${cart.reduce((s,i)=>s+i.price,0)} ج.م*`;
            window.open(`https://wa.me/201145754550?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // بناء شريط الأقسام
        const catBar = document.getElementById('catBar');
        ["الكل", ...cats].forEach(c => {
            catBar.innerHTML += `<button class="bg-gray-100 border-2 px-6 py-1.5 rounded-xl font-bold text-xs hover:border-green-600 transition-all">${c}</button>`;
        });

        function loadMore() { render(); }
        render();
    </script>
</body>
</html>
