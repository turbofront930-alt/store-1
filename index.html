<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خير بلدنا | طلبات البيت بالعامية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .product-card { transition: all 0.2s ease; border: 1px solid #e2e8f0; border-radius: 2rem; overflow: hidden; background: white; }
        .product-card:hover { transform: scale(1.02); border-color: #16a34a; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .engineer-bar { background: #0f172a; color: white; position: fixed; bottom: 0; width: 100%; z-index: 100; padding: 10px; border-top: 2px solid #16a34a; }
    </style>
</head>
<body class="pb-40">

    <!-- Header -->
    <nav class="bg-green-700 text-white p-4 sticky top-0 z-50 shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2" onclick="checkAdmin()" style="cursor:pointer">
                <img src="https://cdn-icons-png.flaticon.com/512/3081/3081840.png" class="w-8 h-8 bg-white rounded-lg p-1">
                <h1 class="text-xl font-black">خير بلدنا</h1>
            </div>
            <div class="bg-yellow-400 text-green-900 px-4 py-1 rounded-full font-black shadow-inner">
                🛒 <span id="cartCount">0</span>
            </div>
        </div>
    </nav>

    <!-- أقسام مصرية عامية -->
    <div class="bg-white shadow-sm overflow-x-auto no-scrollbar whitespace-nowrap p-3 sticky top-[68px] z-40">
        <div class="flex gap-2" id="categoryList">
            <!-- سيتم ملؤه برمجياً -->
        </div>
    </div>

    <!-- شبكة المنتجات -->
    <div class="container mx-auto p-4">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <!-- 10,000 منتج مصري هنا -->
        </div>
        <div class="text-center mt-10">
            <button onclick="loadMore()" class="bg-white border-2 border-green-600 text-green-600 px-8 py-3 rounded-2xl font-black hover:bg-green-600 hover:text-white transition-all">هات منتجات تانية...</button>
        </div>
    </div>

    <!-- شريط المهندس إبراهيم سعد -->
    <div class="engineer-bar">
        <div class="container mx-auto flex justify-between items-center px-4">
            <div class="flex items-center gap-2">
                <span class="bg-green-600 px-2 py-0.5 rounded text-[10px] font-black">PRO</span>
                <span class="text-xs font-bold">تصميم: م/ إبراهيم سعد</span>
            </div>
            <a href="https://wa.me/201101475409" class="text-yellow-400 text-xs font-black tracking-widest">01101475409</a>
        </div>
    </div>

    <script>
        // قاموس الأسماء بالعامية المصرية
        const egyptianNames = [
            "أرز بلدي عريض الحبة", "مكرونة قلم الملكة", "زيت خليط قلية", "سمنة جنة نباتي",
            "صلصة فاين فودز برطمان", "تونا صن شاين مفتتة", "حلاوة طحينية الرشيدي", "عسل أسود صعيدي",
            "جبنة عبور لاند فيتا", "لبن بخيره كيس", "شاي ليبتون خرز", "بيبس لتر ونصف",
            "كلور أبيض أصلي", "صابون مواعين بريل ليمون", "مسحوق غسيل أوكسي", "سلك مواعين ناعم",
            "علبة مرقة دجاج", "خل أبيض مركز", "ملح بونو كيس", "دقيق فينو فاخر"
        ];

        const categories = ["ياميش وبقالة", "منظفات", "ألبان وجبن", "مشروبات وساقع", "مجمدات"];
        let allProducts = [];
        let displayedCount = 24;

        // توليد الـ 10,000 منتج بأسماء مصرية
        function generateEgyptianData() {
            for (let i = 1; i <= 10000; i++) {
                let nameBase = egyptianNames[i % egyptianNames.length];
                let cat = categories[i % categories.length];
                allProducts.push({
                    id: i,
                    name: `${nameBase} - رقم ${i}`,
                    price: 20 + (i % 150),
                    cat: cat,
                    // استخدام خدمة صور عشوائية تعطي شكل منتجات سوبر ماركت
                    img: `https://picsum.photos/seed/${i + 123}/200/200`
                });
            }
        }

        function render() {
            const grid = document.getElementById('productGrid');
            const toAdd = allProducts.slice(grid.children.length, grid.children.length + 24);
            
            toAdd.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card p-3 flex flex-col justify-between">
                        <img src="${p.img}" class="w-full h-32 object-cover rounded-xl mb-2 shadow-inner" alt="منتج">
                        <div>
                            <h3 class="text-[11px] font-bold text-gray-800 h-8 overflow-hidden mb-1">${p.name}</h3>
                            <p class="text-green-600 font-black text-lg mb-2">${p.price} <small class="text-[10px]">ج.م</small></p>
                        </div>
                        <button onclick="addToCart(${p.id})" class="w-full bg-green-50 text-green-700 py-2 rounded-xl text-[10px] font-black border border-green-200 hover:bg-green-600 hover:text-white transition-all">أضف للسلة +</button>
                    </div>
                `;
            });
        }

        function loadMore() { render(); }

        let cartCount = 0;
        function addToCart(id) {
            cartCount++;
            document.getElementById('cartCount').innerText = cartCount;
        }

        // لوحة التحكم بكلمة السر 2000
        function checkAdmin() {
            const p = prompt("كلمة السر يا هندسة:");
            if(p === "2000") alert("أهلاً بك يا بشمهندس إبراهيم في لوحة التحكم");
        }

        // بناء الأقسام في الصفحة
        const catList = document.getElementById('categoryList');
        ["الكل", ...categories].forEach(c => {
            catList.innerHTML += `<button class="bg-gray-100 px-5 py-2 rounded-xl font-bold text-xs text-gray-600 hover:bg-green-600 hover:text-white transition-all">${c}</button>`;
        });

        generateEgyptianData();
        render();
    </script>
</body>
</html>
