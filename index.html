<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوبر ماركت الخير | تسوق أونلاين</title>
    
    <!-- أيقونة الموقع (تظهر في التبويب) -->
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3081/3081840.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .category-btn.active { background-color: #16a34a; color: white; border-color: #16a34a; transform: scale(1.05); }
        .offer-badge { position: absolute; top: 8px; left: 8px; background: #ef4444; color: white; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; z-index: 10; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <!-- Header -->
    <nav class="bg-green-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <img src="https://cdn-icons-png.flaticon.com/512/3081/3081840.png" class="w-8 h-8 brightness-200">
                    <h1 class="text-xl font-bold tracking-tight">سوبر ماركت الخير</h1>
                </div>
                <div class="bg-white text-green-600 px-4 py-1 rounded-full font-bold shadow-sm flex items-center gap-2">
                    <span>🛒</span>
                    <span id="cartCount">0</span>
                </div>
            </div>
            <div class="relative">
                <input type="text" id="searchBar" onkeyup="searchProducts()" placeholder="ابحث عن منتج، زيت، سكر..." class="w-full p-3 rounded-xl text-black outline-none border-none shadow-md">
            </div>
        </div>
    </nav>

    <!-- Categories Nav -->
    <div class="bg-white border-b sticky top-[125px] z-40 overflow-x-auto no-scrollbar shadow-sm">
        <div class="container mx-auto flex p-3 gap-2 whitespace-nowrap">
            <button onclick="filterCategory('all')" class="category-btn active px-6 py-2 rounded-full border text-sm font-bold transition-all shadow-sm">الكل</button>
            <button onclick="filterCategory('offers')" class="category-btn px-6 py-2 rounded-full border border-red-500 text-red-600 font-bold transition-all">🔥 العروض</button>
            <button onclick="filterCategory('food')" class="category-btn px-6 py-2 rounded-full border text-sm font-bold transition-all">غذائية</button>
            <button onclick="filterCategory('dairy')" class="category-btn px-6 py-2 rounded-full border text-sm font-bold transition-all">ألبان</button>
            <button onclick="filterCategory('clean')" class="category-btn px-6 py-2 rounded-full border text-sm font-bold transition-all">منظفات</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mx-auto p-4">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <!-- المنتجات -->
        </div>
    </div>

    <!-- Modal: Checkout -->
    <div id="orderModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-[60] backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl relative">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">بيانات التوصيل 🚚</h2>
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="اسمك بالكامل" class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-green-500 transition">
                <input type="text" id="custAddress" placeholder="عنوانك بالتفصيل" class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-green-500 transition">
                <button onclick="confirmAndSend()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-xl shadow-lg hover:bg-green-700 active:scale-95 transition-all">
                    تأكيد الطلب (واتساب)
                </button>
                <button onclick="toggleModal()" class="w-full text-gray-400 font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- Floating Footer -->
    <div class="fixed bottom-6 left-6 right-6 md:left-auto md:w-96 z-50">
        <button onclick="toggleModal()" class="w-full bg-green-500 text-white p-5 rounded-3xl shadow-2xl font-bold text-lg border-4 border-white flex justify-between items-center hover:bg-green-600 transition-all">
            <div class="flex items-center gap-2">
                <span>إتمام الطلب</span>
                <span class="text-xs bg-green-700 px-2 py-1 rounded-lg">شحن سريع ⚡</span>
            </div>
            <span id="totalDisplay" class="bg-white text-green-700 px-4 py-1 rounded-xl">0 ج.م</span>
        </button>
    </div>

    <script>
        const products = [
            // عروض
            {id: 1, name: "كرتونة مكرونة (10 قطع)", price: 150, oldPrice: 180, cat: "offers", img: "https://m.media-amazon.com/images/I/61N+Vp7K8SL._AC_SL1500_.jpg"},
            {id: 2, name: "شنطة الخير (أرز+زيت+سكر)", price: 140, oldPrice: 165, cat: "offers", img: "https://m.media-amazon.com/images/I/71u9SOfq5sL._AC_SL1500_.jpg"},
            
            // غذائية
            {id: 3, name: "أرز الضحى 1 كجم", price: 38, oldPrice: null, cat: "food", img: "https://images.deliveryhero.io/image/talabat/t_products/P_6221008010012_638202518451125219.JPG"},
            {id: 4, name: "زيت كريستال 800 مل", price: 80, oldPrice: null, cat: "food", img: "https://m.media-amazon.com/images/I/51fT4v8Xm4L._AC_SL1000_.jpg"},
            {id: 5, name: "سكر الأسرة ممتاز", price: 35, oldPrice: null, cat: "food", img: "https://m.media-amazon.com/images/I/71u9SOfq5sL._AC_SL1500_.jpg"},
            
            // ألبان
            {id: 6, name: "جبنة فيتا عبور لاند", price: 52, oldPrice: null, cat: "dairy", img: "https://m.media-amazon.com/images/I/51r2Xo2XyOL._AC_SL1000_.jpg"},
            {id: 7, name: "حليب جهينة 1 لتر", price: 45, oldPrice: null, cat: "dairy", img: "https://m.media-amazon.com/images/I/51f65x6mH8L._AC_SL1000_.jpg"},
            
            // منظفات
            {id: 8, name: "برسيل جيل لافندر", price: 95, oldPrice: 110, cat: "clean", img: "https://m.media-amazon.com/images/I/61S6hUoO8EL._AC_SL1500_.jpg"},
            {id: 9, name: "فيري ليمون كبير", price: 45, oldPrice: null, cat: "clean", img: "https://m.media-amazon.com/images/I/61fW8-3-vLL._AC_SL1500_.jpg"}
        ];

        let cart = [];

        function displayProducts(data = products) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            data.forEach(p => {
                const discount = p.oldPrice ? `<span class="text-xs text-gray-400 line-through mr-1">${p.oldPrice}ج</span>` : '';
                const badge = p.oldPrice ? `<div class="offer-badge">وفر ${p.oldPrice - p.price}ج</div>` : '';
                
                grid.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 flex flex-col relative hover:shadow-md transition-shadow">
                        ${badge}
                        <img src="${p.img}" class="w-full h-24 object-contain mb-2 rounded-lg">
                        <h3 class="font-bold text-xs h-8 text-gray-700 leading-tight mb-1">${p.name}</h3>
                        <div class="mb-3">
                            <span class="text-green-600 font-bold text-lg">${p.price}ج</span>
                            ${discount}
                        </div>
                        <button onclick="addToCart(${p.id})" class="w-full bg-green-50 text-green-600 py-2 rounded-xl font-bold hover:bg-green-600 hover:text-white transition-colors">إضافة +</button>
                    </div>
                `;
            });
        }

        function filterCategory(cat) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase().includes(cat) || (cat === 'all' && btn.innerText === 'الكل')) btn.classList.add('active');
            });
            const filtered = cat === 'all' ? products : products.filter(p => p.cat === cat);
            displayProducts(filtered);
        }

        function searchProducts() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            const filtered = products.filter(p => p.name.includes(term));
            displayProducts(filtered);
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('totalDisplay').innerText = total + " ج.م";
        }

        function toggleModal() {
            if(cart.length === 0) return alert("سلتك فارغة، أضف بعض المنتجات أولاً!");
            document.getElementById('orderModal').classList.toggle('hidden');
        }

        function confirmAndSend() {
            const name = document.getElementById('custName').value;
            const addr = document.getElementById('custAddress').value;
            if(!name || !addr) return alert("فضلاً، أدخل اسمك وعنوانك");

            const phone = "201145754550";
            let text = `📢 *طلب جديد من متجر الخير*\n\n👤 *العميل:* ${name}\n📍 *العنوان:* ${addr}\n\n*المنتجات المطلوبة:*\n`;
            let total = 0;

            cart.forEach((item, index) => {
                text += `${index + 1}. ${item.name} ← *${item.price} ج*\n`;
                total += item.price;
            });

            text += `\n--------------------------\n💰 *الإجمالي النهائي: ${total} ج.م*`;
            
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
        }

        displayProducts();
    </script>
</body>
</html>
