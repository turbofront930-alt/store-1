<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خير بلدنا | أرخص سعر في أشمون</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .product-card { transition: all 0.3s ease; border-radius: 1.5rem; background: white; border: 1px solid #eee; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .category-btn.active { background-color: #16a34a; color: white; border-color: #16a34a; }
        .eng-footer { background: #111827; border-top: 3px solid #16a34a; }
    </style>
</head>
<body class="pb-44">

    <!-- Header -->
    <nav class="bg-green-700 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://cdn-icons-png.flaticon.com/512/3737/3737372.png" class="w-10 h-10 bg-white rounded-xl p-1 shadow-md">
                <h1 class="text-xl font-black">خير بلدنا</h1>
            </div>
            <div class="bg-yellow-400 text-green-900 px-5 py-1.5 rounded-2xl font-black shadow-lg">
                🛒 <span id="cartCount" class="text-xl">0</span>
            </div>
        </div>
    </nav>

    <!-- أزرار الأقسام - تم إصلاح البرمجة -->
    <div class="bg-white shadow-sm overflow-x-auto no-scrollbar whitespace-nowrap p-4 sticky top-[72px] z-40 border-b">
        <div class="flex gap-3" id="catBar">
            <button onclick="filterProducts('الكل')" class="category-btn active border-2 px-6 py-1.5 rounded-xl font-bold text-xs transition-all">الكل</button>
            <button onclick="filterProducts('البقالة')" class="category-btn border-2 px-6 py-1.5 rounded-xl font-bold text-xs transition-all">البقالة</button>
            <button onclick="filterProducts('المنظفات')" class="category-btn border-2 px-6 py-1.5 rounded-xl font-bold text-xs transition-all">المنظفات</button>
            <button onclick="filterProducts('مشروبات')" class="category-btn border-2 px-6 py-1.5 rounded-xl font-bold text-xs transition-all">مشروبات</button>
            <button onclick="filterProducts('جبن وألبان')" class="category-btn border-2 px-6 py-1.5 rounded-xl font-bold text-xs transition-all">جبن وألبان</button>
        </div>
    </div>

    <!-- شبكة المنتجات -->
    <div class="container mx-auto p-4">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-5"></div>
        <div class="text-center mt-12 mb-10">
            <button id="loadMoreBtn" onclick="render()" class="bg-green-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl hover:bg-green-700 active:scale-95 transition-all">مشاهدة المزيد...</button>
        </div>
    </div>

    <!-- زر الواتساب -->
    <a href="https://wa.me/201145754550" target="_blank" class="fixed bottom-36 right-6 z-[60] bg-green-500 text-white p-4 rounded-full shadow-2xl border-4 border-white">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.601 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
    </a>

    <!-- إتمام الطلب -->
    <div class="fixed bottom-14 left-4 right-4 z-50 md:max-w-md md:mx-auto">
        <button onclick="sendToWhatsApp()" class="w-full bg-green-600 text-white p-5 rounded-2xl shadow-2xl flex justify-between items-center border-4 border-white active:scale-95 transition-all">
            <span class="font-black text-lg">تأكيد الطلب 🛍️</span>
            <span id="totalDisplay" class="bg-white text-green-700 px-5 py-1 rounded-xl font-black">0 ج.م</span>
        </button>
    </div>

    <!-- فوتر المهندس إبراهيم -->
    <footer class="fixed bottom-0 left-0 right-0 z-[70] eng-footer text-white py-3 px-6 text-center flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="bg-green-600 w-6 h-6 rounded-full flex items-center justify-center font-black text-[10px]">IS</span>
            <span class="text-[10px]">مهندس إبراهيم سعد</span>
        </div>
        <a href="https://wa.me/201101475409" class="text-yellow-400 font-black text-xs">01101475409</a>
    </footer>

    <script>
        const samples = [
            {n: "أرز بلدي", p: 28, c: "البقالة", img: "https://images.unsplash.com/photo-1586201375761-83865001e31c?w=200"},
            {n: "مكرونة الملكة", p: 12, c: "البقالة", img: "https://images.unsplash.com/photo-1621961458348-f013d219b50c?w=200"},
            {n: "زيت قلي", p: 45, c: "البقالة", img: "https://images.unsplash.com/photo-1474979266404-7eaacbadb8c5?w=200"},
            {n: "ملح بونو", p: 5, c: "البقالة", img: "https://images.unsplash.com/photo-1613082446233-066521798544?w=200"},
            {n: "صابون مواعين", p: 15, c: "المنظفات", img: "https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=200"},
            {n: "كلور أبيض", p: 10, c: "المنظفات", img: "https://images.unsplash.com/photo-1584622781564-1d9876a13d00?w=200"},
            {n: "كانز كولا", p: 15, c: "مشروبات", img: "https://images.unsplash.com/photo-1622483767028-3f66f34a50f4?w=200"},
            {n: "عصير بيتي", p: 12, c: "مشروبات", img: "https://images.unsplash.com/photo-1621506289937-4c72179d548f?w=200"},
            {n: "جبنة فيتا", p: 25, c: "جبن وألبان", img: "https://images.unsplash.com/photo-1559561853-08451507c73a?w=200"},
            {n: "لبن فريش", p: 35, c: "جبن وألبان", img: "https://images.unsplash.com/photo-1550583724-125581f77833?w=200"}
        ];

        let allProducts = [];
        let cart = [];
        let currentFilter = 'الكل';

        // توليد 10,000 منتج بأسعار مخفضة جداً
        for (let i = 1; i <= 10000; i++) {
            let sample = samples[i % samples.length];
            allProducts.push({
                id: i,
                name: `${sample.n} - ${i}`,
                price: sample.p, // سعر حقيقي ورخيص
                cat: sample.c,
                img: sample.img
            });
        }

        function render(reset = false) {
            const grid = document.getElementById('productGrid');
            if(reset) grid.innerHTML = '';
            
            let filtered = currentFilter === 'الكل' ? allProducts : allProducts.filter(p => p.cat === currentFilter);
            let start = grid.children.length;
            let toAdd = filtered.slice(start, start + 24);

            toAdd.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card p-4 flex flex-col justify-between">
                        <img src="${p.img}" class="w-full h-32 object-cover rounded-2xl mb-2">
                        <h3 class="text-[11px] font-bold h-8 overflow-hidden">${p.name}</h3>
                        <p class="text-green-600 font-black text-xl mb-2">${p.price} <small class="text-xs">ج</small></p>
                        <button onclick="addToCart(${p.id})" class="w-full bg-gray-900 text-white py-2 rounded-xl text-[10px] font-black">أضف +</button>
                    </div>`;
            });
        }

        function filterProducts(cat) {
            currentFilter = cat;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === cat);
            });
            render(true);
        }

        function addToCart(id) {
            const p = allProducts.find(x => x.id === id);
            cart.push(p);
            document.getElementById('cartCount').innerText = cart.length;
            document.getElementById('totalDisplay').innerText = cart.reduce((s,i) => s + i.price, 0) + " ج.م";
        }

        function sendToWhatsApp() {
            if(cart.length === 0) return alert("السلة فاضية!");
            let msg = `🛒 *طلب جديد من خير بلدنا*\n\n`;
            cart.forEach((item, i) => msg += `${i+1}. ${item.name} (${item.price} ج)\n`);
            msg += `\n💰 *الإجمالي: ${cart.reduce((s,i)=>s+i.price,0)} ج.م*`;
            window.open(`https://wa.me/201145754550?text=${encodeURIComponent(msg)}`, '_blank');
        }

        render();
    </script>
</body>
</html>
